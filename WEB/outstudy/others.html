<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>其他事项 · 深大生活指南</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #e0e6ec 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            line-height: 1.55;
            color: #1e3a4d;
        }

        .master-card {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .hero-deco {
            background: linear-gradient(90deg, #3a6b8f, #5f9ec0, #7fb8d4);
            height: 10px;
            width: 100%;
        }

        .content-core {
            padding: 2rem 2.2rem 2.5rem;
        }

        /* 文字颜色 */
        h3 {
            color: #2c6b8f;
            margin: 1.2rem 0 0.6rem;
            font-size: 1.3rem;
            border-left: 5px solid #5f9ec0;
            padding-left: 1rem;
        }

        p {
            margin: 0.5rem 0 0.5rem 1rem;
            color: #2c4a5e;
            line-height: 1.55;
        }

        /* 分组框 */
        .section-box {
            background: #f8fbfe;
            border-radius: 24px;
            padding: 0.6rem 1.2rem 0.8rem;
            margin: 1rem 0;
            border: 1px solid #dee9f0;
            transition: all 0.2s;
        }

        .section-box:first-of-type {
            margin-top: 0;
        }

        /* 链接样式 */
        .url-link {
            background: #eef3fc;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #2c6b8f;
            word-break: break-all;
        }

        /* 装饰标签行 */
        .badge-row {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #dcebf3;
            color: #2c6b8f;
            border-radius: 50px;
            padding: 4px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        hr {
            margin: 0.8rem 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c5d8e8, transparent);
        }

        @media (max-width: 600px) {
            .content-core {
                padding: 1.3rem;
            }
            .section-box {
                padding: 0.5rem 1rem;
            }
            p {
                margin-left: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="master-card">
    <div class="hero-deco"></div>
    <div class="content-core">
        <!-- 装饰标签行（不包含文字内容，仅视觉） -->
        <div class="badge-row">
            <div class="badge">🏥 校医院指南</div>
            <div class="badge">📋 请假流程</div>
            <div class="badge">⚡ 电费充值</div>
        </div>

        <!-- ========= 以下为原始文字，一字未改 ========= -->
        <div class="section-box">
            <h3>校医院就诊相关流程</h3>
            <p>/0/去校医院的窗口挂单（没有深圳医保的一次10块，有医保的一次2块，推荐购买深圳医保，在哪都是交）</p>
            <p>/1/候诊，看病</p>
            <p>/2/去挂号窗口盖章，到药房拿药（药不需要费用）</p>
        </div>

        <div class="section-box">
            <h3>请假相关流程</h3>
            <p>/1/先去找辅导员要假条，</p>
            <p>/2/然后去自己学院办公区各种盖章</p>
            <p>/3/交给任课老师或者拍照发给老师（有时候病例也可以当假条）</p>
        </div>

        <div class="section-box">
            <h3>宿舍电费充值流程</h3>
            <p>微信打开网址：https://swzx.webvpn.szu.edu.cn/#/，登录后选择电费充值即可</p>
        </div>
        
        <!-- ========= 原始文字结束 ========= -->
    </div>
</div>
</body>
</html>
