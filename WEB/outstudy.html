<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>非学习类事务</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #e0e6ec 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .master-card {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .hero-deco {
            background: linear-gradient(90deg, #5a6e7a, #7f8c8d, #95a5a6);
            height: 10px;
            width: 100%;
        }

        .content-core {
            padding: 2rem 2rem 2.5rem;
            text-align: center;
        }

        /* 文字颜色 */
        h1 {
            color: #3a6b8f;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        p {
            color: #5a6e7a;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        /* 列表样式 */
        ul {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        li {
            display: block;
            width: 100%;
            max-width: 280px;
        }

        li a {
            display: block;
            background: #eef3fc;
            padding: 12px 20px;
            border-radius: 60px;
            color: #3a6b8f;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #cbdde9;
            transition: all 0.2s;
        }

        li a:hover {
            background: #3a6b8f;
            color: white;
            border-color: #3a6b8f;
        }

        /* 装饰标签行 */
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #d4e3fd;
            color: #3a6b8f;
            border-radius: 50px;
            padding: 4px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        @media (max-width: 600px) {
            .content-core {
                padding: 1.5rem;
            }
            li a {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
<div class="master-card">
    <div class="hero-deco"></div>
    <div class="content-core">
        <!-- 装饰标签行（不包含文字内容，仅视觉） -->
        <div class="badge-row">
            <div class="badge">🎯 非学习类事务</div>
            <div class="badge">📋 生活指南合集</div>
        </div>

        <!-- ========= 以下为原始文字，一字未改 ========= -->
        <h1>测试版</h1>
        <p>意义不明的网页</p>
        <ul>
            <li><a href="./outstudy/primary.html" target="_blank" rel="noopener noreferrer">入学须知</a></li>
            <li><a href="./outstudy/major_change.html" target="_blank" rel="noopener noreferrer">转专业</a></li>
            <li><a href="./outstudy/others.html" target="_blank" rel="noopener noreferrer">其他事项</a></li>
        </ul>
        <!-- ========= 原始文字结束 ========= -->
    </div>
</div>
</body>
</html>
