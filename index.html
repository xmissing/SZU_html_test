<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>第一个程序</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e8edf5 0%, #d3dce8 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        /* 主卡片容器 */
        .master-card {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 顶部装饰条 */
        .hero-deco {
            background: linear-gradient(90deg, #1e4a76, #3b82f6, #1e4a76);
            height: 10px;
            width: 100%;
        }

        /* 内容区域 */
        .content-core {
            padding: 2rem 2rem 2.5rem;
            text-align: center;
        }

        /* 文字颜色样式 */
        h1 {
            color: #1e4a76;
            margin: 0.5rem 0 0.8rem;
            font-size: 2rem;
        }

        h2 {
            color: #2c5f8a;
            margin: 1.2rem 0 0.6rem;
        }

        p {
            color: #2c3e4e;
            margin: 0.6rem 0;
            line-height: 1.5;
        }

        /* 链接样式 */
        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        a:hover {
            color: #1e4a76;
            text-decoration: underline;
        }

        /* 图片样式 */
        img {
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            margin: 1rem 0;
            border: 3px solid #e8edf5;
        }

        /* 分割线 */
        hr {
            margin: 1.5rem auto;
            border: none;
            height: 2px;
            width: 80px;
            background: linear-gradient(90deg, transparent, #aac2d6, transparent);
        }

        /* 列表样式 */
        ul {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        li {
            display: inline-block;
        }
        li a {
            display: inline-block;
            background: #eef3fc;
            padding: 8px 20px;
            border-radius: 40px;
            color: #1e4a76;
            font-weight: 500;
            border: 1px solid #cbdde9;
            transition: all 0.2s;
        }
        li a:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            text-decoration: none;
        }

        /* 标签行装饰 */
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #d4e3fd;
            color: #003b6f;
            border-radius: 50px;
            padding: 4px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        @media (max-width: 600px) {
            .content-core {
                padding: 1.5rem;
            }
            ul {
                flex-direction: column;
                align-items: center;
            }
            li a {
                width: 100%;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
<div class="master-card">
    <div class="hero-deco"></div>
    <div class="content-core">
        <!-- 装饰标签行（不包含文字内容，仅视觉） -->
        <div class="badge-row">
            <div class="badge">🏠 深大新生导航</div>
            <div class="badge">📚 持续更新中</div>
        </div>

        <!-- ========= 以下为原始文字，一字未改 ========= -->
        <h1>测试版</h1>
        <p>？！意义不明的网页！？</p>
        
        <!-- 图片 -->
        <img alt="SZU" src="https://img.cdn1.vip/i/6a1be88581919_1780213893.webp" width="256px" height="256px">
        
        <!-- 链接 -->
        <p><a href="https://www.szu.edu.cn/">点击跳转SZU官网</a></p>
        <p><a href="https://www1.szu.edu.cn/v.asp?id=191">点击跳转SZU内部网指南</a></p>

        <!-- 分割线 -->
        <hr>

        <!-- 自我介绍 -->
        <h2>关于这个网页</h2>
        <p>这个网页以让新生能更好适应深大生活为目的,需要你我共同完善！</p>

        <!-- 列表 -->
        <h2>该网页涉及内容</h2>
        <ul>
            <li><a href="./WEB/courses.html" target="_blank" rel="noopener noreferrer">选课指南</a></li>
            <li><a href="./WEB/food.html" target="_blank" rel="noopener noreferrer">美食寻访</a></li>
            <li><a href="./WEB/study.html" target="_blank" rel="noopener noreferrer">学习生活推荐操作</a></li>
            <li><a href="./WEB/outstudy.html" target="_blank" rel="noopener noreferrer">非学习类事务</a></li>
        </ul>
        <!-- ========= 原始文字结束 ========= -->
    </div>
</div>
</body>
</html>
